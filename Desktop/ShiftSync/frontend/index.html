<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">ShiftSync</span>
    </div>
    <div class="nav-links">
      <a class="nav-link active">Dashboard</a>
      <a class="nav-link">Productions</a>
      <a class="nav-link">Crew</a>
    </div>
    <div class="nav-stats">
      <span class="stat-chip chip-active">Active <span id="stat-active">9</span></span>
      <span class="stat-chip chip-urgent">Urgent <span id="stat-urgent">4</span></span>
      <span class="stat-chip chip-crew">Crew <span id="stat-crew">3</span> 👤</span>
      <span class="stat-chip chip-wrapped">Wrapped <span id="stat-wrapped">3</span></span>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="app-layout">

    <!-- LEFT: Kanban Board -->
    <main class="board-section">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="filter-pills">
          <button class="pill active" data-urgency="all">All</button>
          <button class="pill" data-urgency="urgent">Urgent</button>
          <button class="pill" data-urgency="standard">Standard</button>
          <button class="pill" data-urgency="flexible">Flexible</button>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input" placeholder="Search jobs..." />
        </div>
      </div>

      <!-- Kanban Columns -->
      <div class="kanban">

        <!-- SCHEDULED -->
        <div class="column" id="col-scheduled">
          <div class="col-header">
            <span class="col-dot dot-scheduled"></span>
            <span class="col-title">SCHEDULED</span>
            <span class="col-count" id="count-scheduled">2</span>
          </div>
          <div class="cards" id="cards-scheduled"></div>
        </div>

        <!-- IN PROGRESS -->
        <div class="column" id="col-inprogress">
          <div class="col-header">
            <span class="col-dot dot-inprogress"></span>
            <span class="col-title">IN PROGRESS</span>
            <span class="col-count" id="count-inprogress">1</span>
          </div>
          <div class="cards" id="cards-inprogress"></div>
        </div>

        <!-- WRAPPED -->
        <div class="column" id="col-wrapped">
          <div class="col-header">
            <span class="col-dot dot-wrapped"></span>
            <span class="col-title">WRAPPED</span>
            <span class="col-count" id="count-wrapped">1</span>
          </div>
          <div class="cards" id="cards-wrapped"></div>
        </div>

      </div><!-- /kanban -->

      <!-- New Job Button -->
      <button class="fab" id="new-job-btn" title="New Job (①)">＋</button>

    </main>

    <!-- RIGHT: Crew Roster -->
    <aside class="crew-panel">
      <div class="crew-header">
        <span class="crew-title">Crew Roster</span>
        <span class="crew-count" id="crew-count">3 members</span>
      </div>
      <div id="crew-list" class="crew-list"></div>
      <button class="register-btn" id="register-crew-btn">＋ Register Crew</button>
    </aside>

  </div><!-- /app-layout -->

  <!-- ===== MODALS ===== -->

  <!-- Backdrop -->
  <div class="backdrop hidden" id="backdrop"></div>

  <!-- Create Job Modal -->
  <div class="modal hidden" id="create-job-modal">
    <div class="modal-header">
      <h2 class="modal-title">Create New Job</h2>
      <button class="modal-close" id="close-job-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Job Title <span class="required">*</span></label>
        <input type="text" id="job-title" class="field-input" placeholder="e.g. Main Stage Audio Setup — Arena" />
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Urgency</label>
          <select id="job-urgency" class="field-select">
            <option value="standard">Standard</option>
            <option value="urgent">Urgent</option>
            <option value="flexible">Flexible</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Min. Crew</label>
          <input type="number" id="job-mincrew" class="field-input" value="2" min="1" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Description <span class="required">*</span></label>
        <textarea id="job-desc" class="field-textarea" placeholder="Job brief, location, technical specs... (Max 200 chars)" maxlength="200"></textarea>
        <span class="char-count"><span id="char-used">0</span> / 200</span>
      </div>
      <div class="field-group">
        <label class="field-label">Required Roles</label>
        <div class="checkbox-row">
          <label class="cb-label"><input type="checkbox" value="Sound" /> Sound</label>
          <label class="cb-label"><input type="checkbox" value="AV" checked /> AV</label>
          <label class="cb-label"><input type="checkbox" value="Lighting" /> Lighting</label>
          <label class="cb-label"><input type="checkbox" value="Rigging" /> Rigging</label>
          <label class="cb-label"><input type="checkbox" value="Catering" /> Catering</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancel-job-btn">Cancel</button>
      <button class="btn-primary" id="submit-job-btn">Create Job ✓</button>
    </div>
  </div>

  <!-- Register Crew Modal -->
  <div class="modal hidden" id="register-crew-modal">
    <div class="modal-header">
      <h2 class="modal-title">Register Crew Member</h2>
      <button class="modal-close" id="close-crew-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Full Name <span class="required">*</span></label>
        <input type="text" id="crew-name" class="field-input" placeholder="Full name" />
      </div>
      <div class="field-group">
        <label class="field-label">Contact Email <span class="required">*</span></label>
        <input type="email" id="crew-email" class="field-input" placeholder="email@example.com" />
      </div>
      <div class="field-group">
        <label class="field-label">Roles <span class="required">*</span></label>
        <div class="checkbox-row">
          <label class="cb-label"><input type="checkbox" name="crewrole" value="Sound" /> Sound</label>
          <label class="cb-label"><input type="checkbox" name="crewrole" value="AV" /> AV</label>
          <label class="cb-label"><input type="checkbox" name="crewrole" value="Lighting" /> Lighting</label>
          <label class="cb-label"><input type="checkbox" name="crewrole" value="Rigging" /> Rigging</label>
          <label class="cb-label"><input type="checkbox" name="crewrole" value="Catering" /> Catering</label>
          <label class="cb-label"><input type="checkbox" name="crewrole" value="Logistics" /> Logistics</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancel-crew-btn">Cancel</button>
      <button class="btn-primary" id="submit-crew-btn">Register</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
